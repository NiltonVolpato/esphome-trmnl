# TRMNL Cloud Firmware — example user configuration
#
# Copy this file to your ESPHome config directory and customize the values below.
# The remote package pulls app.yaml from GitHub, which includes all device support
# and cloud logic. No local clone of this repo is needed.
#
# Valid device_type values:
#   "trmnl-og"       — TRMNL (ESP32-C3, Waveshare 7.50inv2, 800x480)
#   "lilygo-t5-s3"   — Lilygo T5-ePaper-S3 (ESP32-S3, ED047TC1, 960x540)
substitutions:
  device_type: "YOUR_DEVICE_TYPE"
  device_name: "YOUR_DEVICE_NAME"
  friendly_name: "Your Device's Friendly Name"

  # Optional: pre-provision Wi-Fi credentials (skip to use captive portal)
  # wifi_ssid: !secret wifi_ssid
  # wifi_password: !secret wifi_password

  # Optional: OTA password (HomeAssistant usually has per-device OTA passwords)
  # ota_password: !secret your_device_ota_password

packages:
  remote_app: github://NiltonVolpato/esphome-trmnl/app.yaml@main
