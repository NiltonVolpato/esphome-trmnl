# Universal cloud firmware — user-facing template
#
# Copy this file to your own config and customize the values below.
# Pick your device type: "trmnl" or "lilygo-t5-s3"
#
# Valid device_type values:
#   "trmnl"          — TRMNL (ESP32-C3, Waveshare 7.50inv2, 800x480)
#   "lilygo-t5-s3"   — Lilygo T5-ePaper-S3 (ESP32-S3, ED047TC1, 960x540)
substitutions:
  device_type: "lilygo-t5-s3"
  device_name: "my-display"
  friendly_name: "My E-Paper Display"

# Optional: pre-provision Wi-Fi credentials (skip to use captive portal)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Optional: OTA password
ota:
  - platform: esphome
    password: !secret ota_password

packages:
  firmware: !include packages/cloud-firmware.yaml
