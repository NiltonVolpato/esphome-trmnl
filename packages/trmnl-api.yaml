# Shared TRMNL cloud logic — display-agnostic
# Include this alongside a device config to get full TRMNL cloud functionality.
#
# Required substitutions (set by device config):
#   image_resize: e.g. "800x480" or "960x540"

substitutions:
  base_url: "https://trmnl.app"

globals:
  - id: device_id
    type: std::string
    max_restore_data_length: 6
    restore_value: true
    initial_value: '""'
  - id: api_key
    type: std::string
    max_restore_data_length: 32
    restore_value: true
    initial_value: '""'
  - id: sleep_time
    type: uint32_t
    restore_value: true
    initial_value: "900"
  - id: api_has_image
    type: bool
    restore_value: no
    initial_value: "false"

display:
  pages:
    - id: trmnl_page
      lambda: |-
        ESP_LOGI("trmnl_page", "Image: %dx%d, Display: %dx%d",
                id(trmnl_image).get_width(), id(trmnl_image).get_height(),
                it.get_width(), it.get_height());
        it.rectangle(0, 0, it.get_width(), it.get_height(), COLOR_ON);
        it.image(0, 0, id(trmnl_image));

event:
  - id: !extend wifi_connected
    on_event:
      then:
        - delay: 16ms
        - logger.log: "Checking for stored credentials..."
        - if:
            condition:
              lambda: |-
                return id(device_id).empty() || id(api_key).empty();
            then:
              - logger.log: "No stored credentials, running setup"
              - script.execute: trmnl_setup
            else:
              - logger.log: "Stored credentials found, running update"
              - script.execute: trmnl_update

http_request:
  buffer_size_tx: 2048
  verify_ssl: false

online_image:
  - id: trmnl_image
    format: PNG
    type: BINARY
    url: https://example.com/placeholder.png
    # resize: "${image_resize}"
    on_download_finished:
      - logger.log: "Image download finished, showing page"
      - display.page.show: trmnl_page
      - component.update: trmnl_display
      - delay: 100ms
      - logger.log:
          format: "Entering deep sleep for %d seconds"
          args: ["id(sleep_time)"]
      - script.execute: enter_deep_sleep
    on_error:
      - logger.log: "Image download/decoding failed, showing fallback screen"
      - script.execute: ${unregistered_screen_script}

sensor:
  - id: !extend battery_voltage
    on_value:
      - text_sensor.template.publish:
          id: battery_voltage_text
          state: !lambda 'return str_sprintf("%.2f", x).c_str();'

text_sensor:
  - platform: wifi_info
    mac_address:
      id: mac_address_sensor
  - platform: template
    id: battery_voltage_text
    update_interval: never

script:
  # /api/setup
  # {
  #     "api_key": "...",
  #     "friendly_id": "...",
  #     "image_url": "https://example.com/images/setup/setup-logo.bmp",
  #     "message": "Device registered successfully",
  #     "status": 200
  # }
  - id: trmnl_setup
    mode: single
    then:
      - logger.log: "Setting up TRMNL — calling /api/setup"
      - http_request.get:
          url: ${base_url}/api/setup
          request_headers:
            ID: !lambda "return id(mac_address_sensor).state.c_str();"
          capture_response: true
          on_response:
            - logger.log:
                format: "TRMNL Setup Response: %s"
                args: [body.c_str()]
            - if:
                condition:
                  lambda: return response->status_code == 200;
                then:
                  - logger.log: "Setup response 200, parsing API key and device_id"
                  - lambda: |-
                      json::parse_json(body, [](JsonObject root) -> bool {
                        id(api_key) = root["api_key"].as<std::string>();
                        id(device_id) = root["friendly_id"].as<std::string>();
                        global_preferences->sync();
                        return true;
                      });
                  - delay: 16ms # lets the http_request component free up the reserved memory
                  - logger.log: "Setup complete, starting update"
                  - script.execute: trmnl_update
                else:
                  - logger.log: "TRMNL Setup failed with non-200 status"
                  - script.execute: ${unregistered_screen_script}
          on_error:
            - logger.log: "TRMNL Setup HTTP request failed"
            - script.execute: ${unregistered_screen_script}

  # /api/display
  # {
  #     "filename": "....bmp",
  #     "firmware_url": "https://example.com/FW1.4.5.bin",
  #     "image_url": "https://example.com/...",
  #     "refresh_rate": 900,
  #     "reset_firmware": false,
  #     "special_function": "identify",
  #     "status": 0,
  #     "update_firmware": null
  # }
  - id: trmnl_update
    mode: single
    then:
      - logger.log: "Updating TRMNL image — calling /api/display"
      - http_request.get:
          url: ${base_url}/api/display
          request_headers:
            ID: !lambda "return id(mac_address_sensor).state.c_str();"
            Access-Token: !lambda "return id(api_key).c_str();"
            Battery-Voltage: !lambda "return id(battery_voltage_text).state.c_str();"
          capture_response: true
          on_response:
            - logger.log:
                format: "TRMNL Update Response: %s"
                args: [body.c_str()]
            - lambda: |-
                id(api_has_image) = false;
                json::parse_json(body, [](JsonObject root) -> bool {
                  if (root["status"].as<int>() == 0 && root["image_url"].is<std::string>()) {
                    id(trmnl_image).set_url(root["image_url"].as<std::string>());
                    id(sleep_time) = root["refresh_rate"].as<uint32_t>();
                    id(api_has_image) = true;
                  }
                  return true;
                });
            - if:
                condition:
                  lambda: return id(api_has_image);
                then:
                  - delay: 16ms # lets the http_request component free up the reserved memory
                  - logger.log: "Update complete, refreshing image"
                  - component.update: trmnl_image
                else:
                  - logger.log: "No image assigned"
                  - script.execute: ${unregistered_screen_script}
          on_error:
            - logger.log: "TRMNL Update HTTP request failed"
            - script.execute: ${unregistered_screen_script}
