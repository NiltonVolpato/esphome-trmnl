# Shared cloud display pages — logo, trmnl_page, and trmnl_logo image.
# WiFi-related pages (wifi_connect, wifi_failed, sleep_warning) live in modules/wifi.yaml.
# Included by packages/cloud-firmware.yaml alongside a device config and the wifi module.

display:
  pages:
    - id: trmnl_page
      lambda: |-
        it.image(0, 0, id(trmnl_image), COLOR_OFF, COLOR_ON);
    - id: logo
      lambda: |-
        it.image(0, 0, id(trmnl_logo));

image:
  - id: trmnl_logo
    file: static/logo.bmp
    type: BINARY
