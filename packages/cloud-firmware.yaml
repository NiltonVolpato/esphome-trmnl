# Universal cloud firmware package — delivers everything for any supported device.
#
# Included by app.yaml (or a user config that sets device_type and variant).
# Valid device_type values: "trmnl", "lilygo-t5-s3"
# Valid variant values: "normal" (default), "factory"

substitutions:
  device_type: "trmnl"
  variant: "normal"

packages:
  device: !include ../devices/${device_type}/device.yaml
  wifi: !include wifi/wifi.yaml
  api: !include trmnl-api.yaml
  extras: !include variants/${variant}.yaml
