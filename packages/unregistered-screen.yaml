# Unregistered / fallback screen module
# Renders a local fuzzy clock with MAC address and battery percentage.
# Self-contained: defines its own display page, SNTP time source,
# battery percentage sensor, and a named script that shows the page
# then enters deep sleep.
#
# The script ID is referenced via the substitution ${unregistered_screen_script},
# which defaults to "show_fuzzy_clock" (defined below). Swap the substitution
# to a different script ID to use a different fallback screen at build time
# without changing trmnl-api.yaml.

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    update_interval: 1d

sensor:
  - platform: copy
    source_id: battery_voltage
    id: battery_percentage
    unit_of_measurement: "%"
    internal: true
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 3.00 -> 0.0
            - 3.50 -> 1.7
            - 3.64 -> 4.6
            - 3.70 -> 7.5
            - 3.73 -> 10.4
            - 3.76 -> 13.3
            - 3.82 -> 19.1
            - 3.84 -> 24.9
            - 3.86 -> 30.6
            - 3.88 -> 36.4
            - 3.91 -> 42.2
            - 3.93 -> 48.0
            - 3.95 -> 53.8
            - 3.99 -> 59.5
            - 4.01 -> 65.3
            - 4.04 -> 74.0
            - 4.05 -> 82.7
            - 4.07 -> 88.4
            - 4.10 -> 94.2
            - 4.13 -> 97.1
            - 4.20 -> 100.0
      - clamp:
          min_value: 0
          max_value: 100

display:
  pages:
    - id: fuzzy_clock_page
      lambda: |-
        int w = it.get_width();
        int h = it.get_height();
        int mid = h / 2;

        // Clear the frame
        it.filled_rectangle(0, 0, w, h, COLOR_OFF);

        // Render fuzzy clock (only when time is synced)
        auto time = id(sntp_time).now();
        if (time.is_valid()) {
          int hour = time.hour;     // 0-23
          int minute = time.minute; // 0-59

          // Convert to 12-hour
          int hour12 = hour % 12;
          int next_hour12 = (hour12 + 1) % 12;

          static const char* hour_words[] = {
            "twelve", "one", "two", "three", "four", "five",
            "six", "seven", "eight", "nine", "ten", "eleven"
          };

          const char* relation;
          const char* hour_word;
          bool single_line = false;

          if (minute <= 2) {
            relation = "o'clock";
            hour_word = hour_words[hour12];
            single_line = true;
          } else if (minute <= 7) {
            relation = "five past";
            hour_word = hour_words[hour12];
          } else if (minute <= 12) {
            relation = "ten past";
            hour_word = hour_words[hour12];
          } else if (minute <= 17) {
            relation = "quarter past";
            hour_word = hour_words[hour12];
          } else if (minute <= 22) {
            relation = "twenty past";
            hour_word = hour_words[hour12];
          } else if (minute <= 27) {
            relation = "twenty-five past";
            hour_word = hour_words[hour12];
          } else if (minute <= 32) {
            relation = "half past";
            hour_word = hour_words[hour12];
          } else if (minute <= 37) {
            relation = "twenty-five to";
            hour_word = hour_words[next_hour12];
          } else if (minute <= 42) {
            relation = "twenty to";
            hour_word = hour_words[next_hour12];
          } else if (minute <= 47) {
            relation = "quarter to";
            hour_word = hour_words[next_hour12];
          } else if (minute <= 52) {
            relation = "ten to";
            hour_word = hour_words[next_hour12];
          } else if (minute <= 57) {
            relation = "five to";
            hour_word = hour_words[next_hour12];
          } else {
            // 58-59
            relation = "o'clock";
            hour_word = hour_words[next_hour12];
            single_line = true;
          }

          if (single_line) {
            // Whole phrase in large font, centered
            it.printf(w / 2, mid, id(sans_serif_large), TextAlign::CENTER,
                      "%s %s", hour_word, relation);
          } else {
            // Two lines: relation in normal font, hour in large font
            it.printf(w / 2, mid - 30, id(sans_serif_normal), TextAlign::CENTER,
                      "%s", relation);
            it.printf(w / 2, mid + 20, id(sans_serif_large), TextAlign::CENTER,
                      "%s", hour_word);
          }
        }

        // Render MAC address at bottom-left
        it.printf(10, h - 10, id(sans_serif_normal), TextAlign::BOTTOM_LEFT,
                  "%s", id(mac_address_sensor).state.c_str());

        // Render battery percentage at bottom-right, guard against NaN
        float batt = id(battery_percentage).state;
        if (isnan(batt)) {
          it.printf(w - 10, h - 10, id(sans_serif_normal), TextAlign::BOTTOM_RIGHT,
                    "--");
        } else {
          it.printf(w - 10, h - 10, id(sans_serif_normal), TextAlign::BOTTOM_RIGHT,
                    "%.0f%%", batt);
        }

script:
  - id: show_fuzzy_clock
    mode: single
    then:
      - display.page.show: fuzzy_clock_page
      - component.update: trmnl_display
      - delay: 100ms
      - deep_sleep.enter:
          sleep_duration: !lambda "return id(sleep_time) * 1000;"
