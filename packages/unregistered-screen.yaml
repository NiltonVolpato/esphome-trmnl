# Unregistered / fallback screen module
# Renders a local fuzzy clock with MAC address and battery percentage.
# Self-contained: defines its own display page, SNTP time source,
# battery percentage sensor, and a named script that shows the page
# then enters deep sleep.
#
# The script ID is referenced via the substitution ${unregistered_screen_script},
# which defaults to "show_fuzzy_clock" (defined below). Swap the substitution
# to a different script ID to use a different fallback screen at build time
# without changing trmnl-api.yaml.

esphome:
  includes:
    - packages/unregistered-screen.h

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    update_interval: 1d

sensor:
  - platform: copy
    source_id: battery_voltage
    id: battery_percentage
    unit_of_measurement: "%"
    internal: true
    filters:
      - calibrate_linear:
          method: exact
          datapoints:
            - 3.00 -> 0.0
            - 3.50 -> 1.7
            - 3.64 -> 4.6
            - 3.70 -> 7.5
            - 3.73 -> 10.4
            - 3.76 -> 13.3
            - 3.82 -> 19.1
            - 3.84 -> 24.9
            - 3.86 -> 30.6
            - 3.88 -> 36.4
            - 3.91 -> 42.2
            - 3.93 -> 48.0
            - 3.95 -> 53.8
            - 3.99 -> 59.5
            - 4.01 -> 65.3
            - 4.04 -> 74.0
            - 4.05 -> 82.7
            - 4.07 -> 88.4
            - 4.10 -> 94.2
            - 4.13 -> 97.1
            - 4.20 -> 100.0
      - clamp:
          min_value: 0
          max_value: 100

display:
  pages:
    - id: fuzzy_clock_page
      lambda: |-
        int w = it.get_width();
        int h = it.get_height();
        int mid = h / 2;

        // Clear the frame
        // it.filled_rectangle(0, 0, w, h, COLOR_OFF);

        // Render fuzzy clock (only when time is synced)
        const esphome::ESPTime& time = id(sntp_time).now();
        it.strftime(w / 2, 10, id(sans_serif_normal), TextAlign::TOP_CENTER, "%Y-%m-%d %H:%M:%S", time);
        if (time.is_valid()) {
          display_fuzzy_time(it, time);
        }

        // Render MAC address at bottom-left
        it.printf(20, h - 10, id(sans_serif_normal), TextAlign::BOTTOM_LEFT,
                  "%s", id(mac_address_sensor).state.c_str());

        // Render battery percentage at bottom-right, guard against NaN
        float batt = id(battery_percentage).state;
        if (isnan(batt)) {
          it.printf(w - 20, h - 10, id(sans_serif_normal), TextAlign::BOTTOM_RIGHT,
                    "--");
        } else {
          it.printf(w - 20, h - 10, id(sans_serif_normal), TextAlign::BOTTOM_RIGHT,
                    "%.0f%%", batt);
        }

script:
  - id: show_fuzzy_clock
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(sntp_time).now().is_valid();'
          then:
            - logger.log: "Time not synced yet, waiting..."
            - wait_until:
                condition:
                  time.has_time:
                timeout: 30s
          else:
            - logger.log: "Time is available and valid."
      - if:
          condition:
            lambda: 'return !id(sntp_time).now().is_valid();'
          then:
            - logger.log: "Time still not synced, showing fallback screen without time."
          else:
            - logger.log: "Time is now synced, showing fuzzy clock."
      - display.page.show: fuzzy_clock_page
      - component.update: trmnl_display
      - delay: 16ms
      - logger.log:
          format: "Entering deep sleep for %d seconds"
          args: ["id(sleep_time)"]
      - deep_sleep.enter:
          sleep_duration: !lambda "return id(sleep_time) * 1000;"
