# TRMNL hardware configuration
# ESP32-C3 + Waveshare 7.50inv2 e-paper display (800x480 B&W)

substitutions:
  # Display properties (overridable by cloud wrapper)
  display_width: "800"
  display_height: "480"
  image_resize: "800x480"
  # Wakeup pin for deep sleep (GPIO2 on TRMNL)
  wakeup_pin: GPIO2
  # User-overridable naming
  device_name: "trmnl"
  friendly_name: "TRMNL"

packages:
  base_pkg: !include base.yaml

esp32:
  board: esp32-c3-devkitm-1

spi:
  mosi_pin: GPIO8
  clk_pin: GPIO7

display:
  platform: waveshare_epaper
  cs_pin: GPIO6
  model: 7.50inv2
  dc_pin: GPIO5
  reset_pin: GPIO10
  busy_pin:
    number: GPIO4
    inverted: true

binary_sensor:
  - id: !extend main_button
    pin:
      number: GPIO9
      inverted: true

sensor:
  - id: !extend battery_voltage
    pin: GPIO3

deep_sleep:
  wakeup_pin:
    number: ${wakeup_pin}
    inverted: true
