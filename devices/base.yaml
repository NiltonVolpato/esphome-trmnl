substitutions:
  device_name: "trmnl"
  friendly_name: "TRMNL"
  ota_password: ""

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: true

esp32:
  framework:
    type: esp-idf

# To be able to get logs from the device via serial and api.
logger:

# API is a requirement of the dashboard import.
api:

# OTA is required for Over-the-Air updating
ota:
  - platform: esphome
    password: ${ota_password}
    id: ota_esphome

# Fonts available using generic names, so it's easy to update the actual font
# without having to change all the references in the code.
font:
  - id: sans_serif_normal
    file: gfonts://Open+Sans@500
    size: 32
    bpp: 4
  - id: sans_serif_large
    file: gfonts://Open+Sans@500
    size: 64
    bpp: 4

# We expect all devices to have a display. We set some common attributes here,
# like the "id" and other common settings, but the actual display component
# (model, pins, etc) should be defined in the device-specific YAML file.
display:
  id: trmnl_display
  update_interval: never
  auto_clear_enabled: false
  pages:
    - id: main_page
      lambda: |-
        it.filled_rectangle(0, 0, it.get_width(), it.get_height(), COLOR_OFF);
        it.printf(it.get_width() / 2, it.get_height() / 2, id(sans_serif_normal), TextAlign::CENTER, "Hello ESPHome");

# Main button. Pin should be overriden per device.
binary_sensor:
  - id: main_button
    platform: gpio
    name: Main Button

# Battery voltage via ADC. Pin should be overriden per device.
sensor:
  - id: battery_voltage
    platform: adc
    name: Battery Voltage
    attenuation: 12db
    samples: 128
    filters:
      - multiply: 2.0

button:
  - id: restart_button
    platform: restart
    name: Restart

deep_sleep:
  run_duration: 300s
