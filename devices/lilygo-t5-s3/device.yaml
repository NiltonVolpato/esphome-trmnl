# Lilygo T5-ePaper-S3 (EPD47) hardware configuration
# ESP32-S3 + ED047TC1 parallel e-paper display (960x540, 16 grayscale)

substitutions:
  # Display properties (overridable by cloud wrapper)
  display_width: "960"
  display_height: "540"
  image_resize: "960x540"
  # Wakeup pin for deep sleep (button on GPIO21)
  wakeup_pin: GPIO21
  # User-overridable naming
  device_name: "lilygo"
  friendly_name: "Lilygo EPD47"
  # OTA credentials.
  ota_password: ""

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  platformio_options:
    lib_ignore:
      - Button2
      - SensorLib

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  variant: esp32s3

psram:
  mode: octal

# To be able to get logs from the device via serial and api.
logger:

# API is a requirement of the dashboard import.
api:

# OTA is required for Over-the-Air updating
ota:
  - platform: esphome
    password: ${ota_password}
    id: ota_esphome

# External components for the ED047TC1 display driver
external_components:
  - source:
      type: local
      path: components/
    components: ["ed047tc1"]

font:
  - id: sans_serif_normal
    file: gfonts://Open+Sans@500
    size: 32
    bpp: 4
  - id: sans_serif_large
    file: gfonts://Open+Sans@500
    size: 64
    bpp: 4

# I2C bus for optional RTC (PCF8563) and touch
i2c:
  sda: GPIO18
  scl: GPIO17
  frequency: 100kHz
  scan: false

display:
  platform: ed047tc1
  id: trmnl_display
  greyscale: true
  update_interval: never
  auto_clear_enabled: false
  pages:
    - id: main_page
      lambda: |-
        it.filled_rectangle(0, 0, it.get_width(), it.get_height(), COLOR_OFF);
        it.printf(it.get_width() / 2, it.get_height() / 2, id(sans_serif_normal), TextAlign::CENTER, "Hello ESPHome");

binary_sensor:
  - platform: gpio
    name: Button
    id: back_button
    pin:
      number: GPIO21
      inverted: true
      allow_other_uses: true

sensor:
  # Battery voltage via ADC on GPIO14.
  # On the standard Lilygo T5-ePaper-S3, battery is read via GPIO14.
  # If your board differs, adjust this pin.
  - platform: adc
    name: Battery Voltage
    id: battery_voltage
    pin: GPIO14
    attenuation: 12db
    samples: 128
    filters:
      - multiply: 2.0

button:
  - platform: restart
    name: Restart
    id: restart_button

deep_sleep:
  wakeup_pin:
    number: ${wakeup_pin}
    inverted: true
    allow_other_uses: true
