packages:
  # Include all of the core configuration
  core: !include device.yaml

esphome:
  # This will allow for project identification,
  # configuration and updates.
  project:
    name: NiltonVolpato.esphome-trmnl-lilygo
    version: dev

# This should point to the public location of the yaml file that will be adopted.
dashboard_import:
  package_import_url: github://NiltonVolpato/esphome-trmnl/devices/lilygo-t5-s3/device.yaml@main

improv_serial:

button:
  - platform: factory_reset
    name: Factory Reset
    id: factory_reset_button

binary_sensor:
  - id: !extend back_button
    on_multi_click:
      - timing:
          - ON for at least 3s
          - OFF for at least 0.5s
        then:
          - button.press: factory_reset_button
